<!DOCTYPE html>
<html lang='ru'>
<head>
    <link rel='icon' type='image/svg+xml' sizes='any' href='/st/Favicon_as.svg'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Статьи и новости. Редактирование - Автосеть.РФ</title>
    <meta http-equiv='Content-Type' content='text/html; charset=UTF-8'>
    <meta name='robots' content='noindex'>

    <link rel='stylesheet' href='../src/css/style.css'/>
    <link rel='stylesheet' href='../src/css/filter-controls.css'/>
    <link rel='stylesheet' href='../src/css/admin.css'/>
    <script type='module' src='js/admin-article.js'></script>
    <script type="text/javascript" src="js/nicEdit-latest.js"></script>
    <style>
        #myModal [contenteditable="true"]:hover {
            background: pink;
            outline: thin;

        }

        #myModal span.label {
            background: yellow;
            font-size: 12px;
        }

        #myModal .buttons--sticky {
            position: sticky;
            bottom: -16px;
            padding: 3px 12px;
            background: #ddddddee;
        }

        #myModal .modalcloser--sticky {
            position: sticky;
            top: -16px;
            padding: 4px 12px;
            float: right;
            cursor: pointer;
        }

        #myModal .mainPhoto_big{
            width: 840px;
        }

        @media (width<500px) {
            #myModal .mainPhoto_big{
                width: 300px;
            }
        }
    </style>
</head>
<body style='margin-top: 73px'>

<h3 class="head_admin">
    <span style="font-size: small; float:left"><a href="/"> Перейти к сайту </a></span>
    Админка. Статьи и новости.
    <button style="float: right; margin-right: 18px" onclick="logoutExit()">Выйти из админки</button>
</h3>

<main>
    <h1> Редактор</h1>
    <br>
    <div class="buttons">
        <small class="summ" style="float: left">Статей - 0, не активных статей - 0 </small>
        <button class="admin_add_button" onclick="saveNewArticleModal()"> Добавить новый</button>
        <div class="hideField" style="display: none">
            <button class="admin_add_button" onclick="cancelArticle()"> Отменить изменения</button>
            <button class="admin_add_button" onclick="saveArticle()"> Сохранить изменения</button>
        </div>
    </div>
    <br><br><br>


    <div id="article_table_1"></div>

    <div id="sample">
        <h4> Second Textarea </h4>
        <textarea name="area2" style="width: 100%;">
                Some Initial Content was in this textarea
            </textarea>
    </div>

</main>

<dialog id="myModal" class="type new" style="max-width: 900px; min-width: 330px">
    <button id="closeBtn" class="modalcloser--sticky">✖</button>
    <h2 class="type_new">Новая статья</h2>
    <h2 class="type_edit">Редактирование статьи</h2>

    <details title="Код статьи, автоматически создается" style="text-align: center">
        <summary></summary>
        <div>
            <label>Код</label>
            <input style="width: 73px" id="qw4" oninput="changeCod(this)">
            <small> * код статьи рекомендуется не менять. Для SEO</small>
        </div>
        <button onclick="codGeneration()"
                title="Используйте только если уверены, что хотите из поисковиков удалить прежнюю ссылку">
            Генерировать новый код
        </button>
        <br><br>
        <div title="Влияет на очередность появления в списке">
            <label>Порядок</label>
            <input id="qw2">
        </div>

    </details>
    <br><br>

    <div style="display: flex; flex-wrap: wrap">
        <div style="display: flex; justify-content: space-between; width: 100%">
            <div title="Тут акцию можно выключить">
                <label for="qw3">Опубликовано на сайте</label>
                <input type="checkbox" id="qw3">
            </div>
            <div><a href="#">Предварительный просмотр</a>
            </div>
        </div>
        <div class="photo-div">
            <div>
                <img id="_278" class="mainPhoto_big" style="width: 840px" alt="">
                <button onclick="uploadPhoto()"> Добавить/сменить фото</button>
            </div>
        </div>
    </div>
    <div>

        <span class="label">Краткий анонс</span>
        <div contenteditable="true" id="qw10">
        </div>

        <div>
            <span class="label">Заголовок</span>
            <h2 contenteditable="true" id="qw0">
            </h2>
        </div>

        <span class="label">Содержимое статьи</span>
        <div contenteditable="true" id="qw11"></div>
    </div>


    <div class="buttons--sticky">
        <div>
            <button class="type_new" onclick="saveNewArticleModal()">Создать статью</button>
            <button class="type_edit" onclick="saveArticleModal()">Сохранить статью</button>
        </div>
    </div>

</dialog>


</body>
</html>
