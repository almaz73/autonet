<!DOCTYPE html>
<html lang='ru'>
<head>
    <link rel='icon' type='image/svg+xml' sizes='any' href='/st/favicon.svg'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Промоакции. Редактирование - Автосеть.РФ</title>
    <meta http-equiv='Content-Type' content='text/html; charset=UTF-8'>
    <meta name='robots' content='noindex'>

    <link rel='stylesheet' href='../src/css/style.css'/>
    <link rel='stylesheet' href='../src/css/filter-controls.css'/>
    <link rel='stylesheet' href='../src/css/admin.css'/>
    <script type='module' src='js/admin-promo.js'></script>
</head>
<body style='margin-top: 73px'>

<h3 class="head_admin">
    <span style="font-size: small; float:left"><a href="/"> Перейти к сайту </a></span>
    Админка. Промоакции.

    <button style="float: right; margin-right: 18px" onclick="logoutExit()">Выйти из админки</button>
</h3>

<main>
    <h1> Редактирование промоакций </h1>
    <br>
    <div class="buttons">
        <small class="summ" style="float: left; margin-top: 32px;">Активных акций - 0, на главной - 0 </small>
        <button class="admin_add_button" onclick="saveNewPromoModal()"> Добавить новый</button>
        <div class="hideField" style="display: none">
            <button class="admin_add_button" onclick="cancelPromo()"> Отменить</button>
            <button class="admin_add_button" onclick="savePromo()"> Сохранить</button>
        </div>
    </div>
    <br><br><br>


    <div id="promo_table_1" class="table_head"></div>
    <div id="promo_table_2" class="table_content"></div>


</main>

<dialog id="myModal" class="type new">
    <button id="closeBtn">✖</button>
    <h2 class="type_new">Новая промоакция</h2>
    <h2 class="type_edit">Редактирование промоакции</h2>

    <details title="Код промоакции, автоматически создается" style="text-align: center">
        <summary></summary>
        <div>
            <label>Код акции</label>
            <input style="width: 73px" id="qw4" oninput="changeCod(this)">
            <small> * рекомендуется не менять. Для SEO</small>
            <br>
            <button onclick="codGeneration()"
                    title="Используйте только если уверены, что хотите из поисковиков удалить прежнюю ссылку">
                Генерировать новый код
            </button>
        </div>
    </details>

    <div>
        <label>Название</label>
        <input style="width: 100%" id="qw0">
    </div>

    <div style="display: flex; flex-wrap: wrap">
        <div>
            <div title="Акции можно включить для показа на главной странице">
                <label for="qw1">На главной</label>
                <input type="checkbox" id="qw1">
            </div>
            <div title="Влияет на очередность появления в списке">
                <label>Порядок</label>
                <input id="qw2">
            </div>
            <div title="Тут акцию можно выключить">
                <label for="qw3">Актив</label>
                <input type="checkbox" id="qw3">
            </div>
        </div>
        <div class="photo-div">
            <div><button onclick="uploadPhoto('278х402')"> Добавить</button>
                <img id="_278" style="width: 50px" alt="">
                <label>Фото 278х402</label>
            </div>
            <div>
                <button onclick="uploadPhoto('585х200')"> Добавить</button>
                <img id="_585" style="width: 50px" alt="">
                <label>Фото 585х200</label>
            </div>
            <div>
                <button onclick="uploadPhoto('1200х501')"> Добавить</button>
                <img id="_1200" style="width: 330px" alt="">
                <label>Фото 1200х501</label>
            </div>
        </div>
    </div>
    <button class="type_new" style="float: right" onclick="saveNewPromoModal()">Создать промоакцию</button>
    <button class="type_edit" style="float: right" onclick="savePromoModal()">Сохранить промоакцию</button>

</dialog>


</body>
</html>
