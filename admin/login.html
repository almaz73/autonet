<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админку - Автосеть.РФ</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .login-container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .login-button {
            width: 100%;
            padding: 0.5rem;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        .login-button:hover {
            background-color: #0056b3;
        }
        .error-message {
            color: red;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Вход в админку</h2>
        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button class="login-button" onclick="handleLogin()">Войти</button>
        <div class="error-message" id="error-message"></div>
    </div>

    <script type="module">
        import { login } from "../src/js/auth-service.js";

        window.handleLogin = function () {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            if (!username || !password) {
                errorMessage.textContent = 'Пожалуйста, введите логин и пароль';
                errorMessage.style.display = 'block';
                return;
            }

            login({ username, password }, (result) => {
                if (result.success) {
                    // Redirect back to the promo page after successful login
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirectUrl = urlParams.get('redirect') || '../promo.html';
                    
                    window.location.href = redirectUrl;
                } else {
                    errorMessage.textContent = result.error || 'Неверный логин или пароль';
                    errorMessage.style.display = 'block';
                }
            });
        }

        // Handle Enter key press
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                window.handleLogin();
            }
        });
    </script>
</body>
</html>
